# Railway (Nixpacks): Docker 없이 백엔드 + 플레이어 정적 빌드를 한 번에 처리합니다.
# 루트 디렉터리는 저장소 루트(/)로 두세요.

[phases.setup]
# Nix의 python312만 쓰면 pip 모듈이 없음 → get-pip로 부트스트랩 (curl 필요)
nixPkgs = ["nodejs_20", "python312", "gcc", "curl"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "curl -sS https://bootstrap.pypa.io/get-pip.py | python3",
  "python3 -m pip install -r backend/requirements.txt",
  "cd player && npm ci",
]

[phases.build]
dependsOn = ["install"]
cmds = [
  "cd player && npm run build",
  "mkdir -p backend/player_dist",
  "rm -rf backend/player_dist/*",
  "cp -r player/dist/. backend/player_dist/",
]
