# Railway (Nixpacks): Docker 없이 백엔드 + 플레이어 정적 빌드를 한 번에 처리합니다.
# 루트 디렉터리는 저장소 루트(/)로 두세요.

[phases.setup]
# Nix Python은 PEP 668(externally-managed) → 전역 pip 설치 불가. /app/.venv 에 격리 후 설치
# Vite 7 / @vitejs/plugin-react 5 는 Node ^20.19 || >=22.12 — nix의 nodejs_20 은 20.6대라 nodejs_22 사용
nixPkgs = ["nodejs_22", "python312", "gcc"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install --upgrade pip",
  "/app/.venv/bin/pip install -r backend/requirements.txt",
  "cd player && npm ci",
]

[phases.build]
dependsOn = ["install"]
cmds = [
  "cd player && npm run build",
  "mkdir -p backend/player_dist",
  "rm -rf backend/player_dist/*",
  "cp -r player/dist/. backend/player_dist/",
]
