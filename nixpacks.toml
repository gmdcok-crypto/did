# (선택) Nixpacks 빌드 — Railway 기본은 루트 Dockerfile + railway.toml 의 builder = "DOCKERFILE".
# Railway (Nixpacks): Docker 없이 백엔드 + 플레이어 정적 빌드를 한 번에 처리합니다.
# 루트 디렉터리는 저장소 루트(/)로 두세요.

[phases.setup]
# Nix Python은 PEP 668(externally-managed) → 전역 pip 설치 불가. /app/.venv 에 격리 후 설치
# Railway Nixpacks nixpkgs 스냅샷에 nodejs_22 가 없음 → nodejs_20 사용, npm은 --ignore-engines (Vite 엔진 경고만 무시)
# greenlet(SQLAlchemy async) 이 libstdc++.so.6 필요 — nixLibs + apt 로 런타임 제공
nixPkgs = ["nodejs_20", "python312", "gcc"]
nixLibs = ["gcc"]
aptPkgs = ["libstdc++6"]

[phases.install]
dependsOn = ["setup"]
cmds = [
  "python3 -m venv /app/.venv",
  "/app/.venv/bin/pip install --upgrade pip",
  "/app/.venv/bin/pip install -r backend/requirements.txt",
  "cd player && npm ci --ignore-engines",
  "cd cms && npm ci --ignore-engines",
]

[phases.build]
dependsOn = ["install"]
cmds = [
  "cd player && npm run build",
  "mkdir -p backend/player_dist",
  "rm -rf backend/player_dist/*",
  "cp -r player/dist/. backend/player_dist/",
  "cd cms && VITE_BASE_PATH=/admin/ npm run build",
  # 테스트 시 CMS 자동 로그인: Railway Variables 에 VITE_SKIP_AUTH=1 (및 선택 VITE_SKIP_AUTH_EMAIL/PASSWORD) 후 빌드
  "mkdir -p backend/cms_dist",
  "rm -rf backend/cms_dist/*",
  "cp -r cms/dist/. backend/cms_dist/",
]
