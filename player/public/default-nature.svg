  <path d="M0 580 L180 430 L350 560 L560 370 L790 610 L1030 380 L1270 580 L1510 430 L1740 610 L1920 530 L1920 1080 L0 1080 Z" fill="#5d8394" />

  <ellipse cx="990" cy="760" rx="1030" ry="210" fill="url(#lake)" />
  <path d="M0 760 C260 700 430 700 650 760 C900 830 1080 830 1330 760 C1560 700 1710 700 1920 760 L1920 1080 L0 1080 Z" fill="url(#meadow)" />

  <g fill="#356e33">
