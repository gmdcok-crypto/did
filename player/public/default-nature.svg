<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Default Nature Screen</title>
  <desc id="desc">A calm nature landscape with sky, mountains, trees, and a lake.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7ecbff" />
      <stop offset="55%" stop-color="#c9efff" />
      <stop offset="100%" stop-color="#f5fbff" />
    </linearGradient>
    <linearGradient id="lake" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#70c6db" />
      <stop offset="100%" stop-color="#2d7890" />
    </linearGradient>
    <linearGradient id="meadow" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#8ecb66" />
      <stop offset="100%" stop-color="#4f8d37" />
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)" />
  <circle cx="1480" cy="180" r="88" fill="#fff6b0" opacity="0.95" />

