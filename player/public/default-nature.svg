    <rect x="378" y="800" width="20" height="98" fill="#6a4a2a" />
    <path d="M1480 770 l60 -150 l60 150 z" />
    <rect x="1533" y="770" width="18" height="90" fill="#6a4a2a" />
    <path d="M1660 810 l70 -185 l70 185 z" />
