# HTTPS 통일: docker-compose.yml 에 이미 반영됨. 이 파일은 예전 방식용 참고.
# 사용: docker compose up -d (메인만으로 HTTPS 적용)
# 예전: docker compose -f docker-compose.yml -f docker-compose.https.yml up -d

services:
  backend:
    volumes:
      - ./uploads:/app/uploads
      - ./player_dist:/app/player_dist
      - ./certs:/app/certs
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--ssl-keyfile", "/app/certs/key.pem", "--ssl-certfile", "/app/certs/cert.pem"]
