# PWA Digital Ad CMS - Backend + MariaDB
# 사용: docker compose up -d
# API: http://localhost:8000
#
# MariaDB 비밀번호 등 변경 시 backend 폴더에 .env 생성 후:
#   MYSQL_ROOT_PASSWORD=...
#   MYSQL_PASSWORD=...
#   SECRET_KEY=...

services:
  mariadb:
    image: mariadb:latest
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-did}
      MYSQL_USER: ${MYSQL_USER:-did}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-didpass}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-did}:${MYSQL_PASSWORD:-didpass}@mariadb:3306/${MYSQL_DATABASE:-did}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      REGISTRATION_AUTH_CODE: ${REGISTRATION_AUTH_CODE:-dev1234}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"

volumes:
  mariadb_data:
