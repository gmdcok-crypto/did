# Railway: Dockerfile 빌드 (Debian 단일 런타임 — Nixpacks 대비 glibc/libstdc++ 안정)
# 서비스 Root Directory: 저장소 루트 (/)
# Public Networking → Target Port 는 비우거나 앱이 bind 하는 PORT 와 같게

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# 이미지 WORKDIR=/app/backend, 시스템 Python (venv·LD_LIBRARY_PATH 불필요)
startCommand = "sh -c 'cd /app/backend && exec python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
